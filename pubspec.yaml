name: travel_ai
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  local_auth: ^2.1.8
  http: ^1.2.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.0
  image_picker: ^1.0.7
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  flutter_tts: ^3.8.3
  url_launcher: ^6.2.5
  introduction_screen: ^3.1.12
  bounceable: ^1.0.0
  supabase_flutter: ^2.12.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21